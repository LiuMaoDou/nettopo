<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Monitor screen -->
  <rect x="8" y="8" width="48" height="34" rx="4" stroke="white" stroke-width="3" fill="none"/>
  <!-- Screen content lines -->
  <line x1="16" y1="20" x2="48" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="36" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Stand neck -->
  <line x1="32" y1="42" x2="32" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Stand base -->
  <line x1="20" y1="52" x2="44" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
